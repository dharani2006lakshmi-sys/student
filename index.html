<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Student Info System</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="firebase.js"></script>
</head>
<body>
  <div id="navbar"></div>
  <h1>Login/Register</h1>

  <h2>Register</h2>
  <form onsubmit="event.preventDefault(); registerUser(regName.value, regEmail.value, regPassword.value, regRole.value)">
    <input type="text" id="regName" placeholder="Name" required>
    <input type="email" id="regEmail" placeholder="Email" required>
    <input type="password" id="regPassword" placeholder="Password" required>
    <select id="regRole" required>
      <option value="student">Student</option>
      <option value="staff">Staff</option>
    </select>
    <button type="submit">Register</button>
  </form>

  <h2>Login</h2>
  <form onsubmit="event.preventDefault(); loginUser(logEmail.value, logPassword.value)">
    <input type="email" id="logEmail" placeholder="Email" required>
    <input type="password" id="logPassword" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>

  <h2>Or</h2>
  <button onclick="googleLogin()">Sign in with Google</button>
</body>
</html>
