```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UniSIS Login</title>

<!-- Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* CONTAINER */
.container {
  display: flex;
  width: 900px;
  border-radius: 20px;
  overflow: hidden;
  background: #0f172a;
  box-shadow: 0 0 50px rgba(0,0,0,0.6);
}

/* LEFT */
.left {
  width: 50%;
  padding: 40px;
  background: linear-gradient(135deg,#020617,#0f172a);
}

.left h1 {
  color: #3b82f6;
}

.feature {
  margin-top: 20px;
  display: flex;
  gap: 10px;
  opacity: 0.9;
}

/* RIGHT */
.right {
  width: 50%;
  padding: 40px;
}

/* TABS */
.tabs {
  display: flex;
  margin-bottom: 20px;
}

.tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  cursor: pointer;
  background: #1e293b;
}

.active {
  background: #3b82f6;
}

/* INPUT */
.input-box {
  position: relative;
  margin-bottom: 15px;
}

.input-box input {
  width: 100%;
  padding: 12px 40px;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
}

.input-box i {
  position: absolute;
  top: 12px;
  left: 10px;
  color: #3b82f6;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.primary {
  background: #3b82f6;
  color: white;
}

.google {
  background: white;
  color: black;
}

</style>
</head>

<body>

<div class="container">

  <!-- LEFT SIDE -->
  <div class="left">
    <h1>UniSIS</h1>
    <p>Student Information System</p>

    <div class="feature"><i class="fa fa-chart-line"></i> Dashboard & Analytics</div>
    <div class="feature"><i class="fa fa-user-graduate"></i> Student Management</div>
    <div class="feature"><i class="fa fa-calendar"></i> Attendance</div>
    <div class="feature"><i class="fa fa-pen"></i> Grades</div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">

    <div class="tabs">
      <div id="loginTab" class="tab active" onclick="switchTab('login')">Login</div>
      <div id="registerTab" class="tab" onclick="switchTab('register')">Register</div>
    </div>

    <h2 id="title">Welcome Back 👋</h2>

    <div class="input-box">
      <i class="fa fa-envelope"></i>
      <input id="email" placeholder="Email">
    </div>

    <div class="input-box">
      <i class="fa fa-lock"></i>
      <input id="password" type="password" placeholder="Password">
    </div>

    <button id="btn" class="primary" onclick="handleAuth()">Sign In</button>

    <button class="google" onclick="googleLogin()">
      <i class="fa-brands fa-google"></i> Continue with Google
    </button>

  </div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDIVgcyflRaYXwaV5wSeKjb1wsocNdpd_8",
  authDomain: "student-ef9fa.firebaseapp.com",
  projectId: "student-ef9fa",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let mode = "login";

// SWITCH TAB
window.switchTab = (type) => {
  mode = type;

  document.getElementById("loginTab").classList.remove("active");
  document.getElementById("registerTab").classList.remove("active");

  if (type === "login") {
    document.getElementById("loginTab").classList.add("active");
    document.getElementById("btn").innerText = "Sign In";
    document.getElementById("title").innerText = "Welcome Back 👋";
  } else {
    document.getElementById("registerTab").classList.add("active");
    document.getElementById("btn").innerText = "Register";
    document.getElementById("title").innerText = "Create Account 🚀";
  }
};

// LOGIN / REGISTER
window.handleAuth = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  try {
    if (mode === "login") {
      await signInWithEmailAndPassword(auth, email, pass);
    } else {
      await createUserWithEmailAndPassword(auth, email, pass);
    }
    window.location = "dashboard.html";
  } catch (e) {
    alert(e.message);
  }
};

// GOOGLE LOGIN
window.googleLogin = async () => {
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth, provider);
  window.location = "dashboard.html";
};

</script>

</body>
</html>
```
