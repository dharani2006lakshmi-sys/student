<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UniSIS Login</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  background: radial-gradient(circle at top, #0f172a, #020617);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

/* GLASS CARD */
.card {
  width: 350px;
  padding: 30px;
  border-radius: 20px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 40px rgba(0,255,255,0.2);
  animation: fade 1s ease;
}

/* TITLE */
h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #38bdf8;
}

/* INPUT BOX */
.input-box {
  position: relative;
  margin-bottom: 15px;
}

.input-box input {
  width: 100%;
  padding: 12px 40px;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
}

.input-box i {
  position: absolute;
  top: 12px;
  left: 10px;
  color: #38bdf8;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  transition: 0.3s;
}

.primary {
  background: #3b82f6;
  box-shadow: 0 0 15px #3b82f6;
}

.primary:hover {
  transform: scale(1.05);
}

.google {
  background: white;
  color: black;
}

/* TEXT */
.switch {
  text-align: center;
  margin-top: 10px;
  cursor: pointer;
  color: #38bdf8;
}

/* ANIMATION */
@keyframes fade {
  from {opacity:0; transform: translateY(30px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="card">

  <h2 id="title">Welcome Back 👋</h2>

  <div class="input-box">
    <i class="fa fa-envelope"></i>
    <input id="email" placeholder="Email">
  </div>

  <div class="input-box">
    <i class="fa fa-lock"></i>
    <input id="password" type="password" placeholder="Password">
  </div>

  <button class="primary" onclick="handleAuth()">Login</button>

  <button class="google" onclick="googleLogin()">
    <i class="fa-brands fa-google"></i> Continue with Google
  </button>

  <div class="switch" onclick="toggleMode()">
    Create account
  </div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// YOUR CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDIVgcyflRaYXwaV5wSeKjb1wsocNdpd_8",
  authDomain: "student-ef9fa.firebaseapp.com",
  projectId: "student-ef9fa",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let mode = "login";

// SWITCH LOGIN/REGISTER
window.toggleMode = () => {
  mode = mode === "login" ? "register" : "login";
  document.getElementById("title").innerText =
    mode === "login" ? "Welcome Back 👋" : "Create Account 🚀";
};

// LOGIN / REGISTER
window.handleAuth = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  try {
    if (mode === "login") {
      await signInWithEmailAndPassword(auth, email, pass);
    } else {
      await createUserWithEmailAndPassword(auth, email, pass);
    }
    window.location = "dashboard.html";
  } catch (e) {
    alert(e.message);
  }
};

// GOOGLE LOGIN
window.googleLogin = async () => {
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth, provider);
  window.location = "dashboard.html";
};
</script>

</body>
</html>
